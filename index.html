<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位测评 · 答题</title>
<style>
/* ============================================================
   岗位测评 — Shared Design System (答题端 + 管理后台)
   ============================================================ */
:root{
  --bg:#f3f5fb;
  --card:#ffffff;
  --card-2:#f6f8fd;
  --ink:#1c2431;
  --muted:#69748a;
  --brand:#3a63f0;
  --brand-d:#2949c4;
  --brand-soft:#eaf0ff;
  --line:#e5e9f2;
  --line-2:#eef1f8;
  --ok:#15a34a;
  --ok-soft:#e7f6ec;
  --bad:#dc2626;
  --bad-soft:#fdeaea;
  --warn:#d97706;
  --warn-soft:#fdf1e1;
  --shadow:0 6px 24px rgba(28,42,80,.08);
  --shadow-sm:0 2px 8px rgba(28,42,80,.06);
  --shadow-lg:0 14px 40px rgba(28,42,80,.14);
  --r:14px;
  --r-sm:10px;
  --r-pill:999px;
  --fs:15px;
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:
    radial-gradient(1200px 500px at 50% -200px, #eaf0ff 0%, rgba(234,240,255,0) 70%),
    var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  font-size:var(--fs);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
/* ---------- Layout ---------- */
.wrap{width:100%;max-width:960px;margin:0 auto;padding:20px 18px 64px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:14px 18px;margin:0 auto 20px;max-width:960px;
  background:rgba(255,255,255,.86);
  backdrop-filter:saturate(160%) blur(10px);
  border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:16px;letter-spacing:.2px}
.logo{
  width:36px;height:36px;flex:0 0 36px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand) 0%,#5b7bff 55%,#8aa2ff 100%);
  box-shadow:0 4px 12px rgba(58,99,240,.35), inset 0 1px 0 rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;
}
h1{font-size:20px;line-height:1.35;margin:0 0 4px;letter-spacing:-.2px}
h2{font-size:17px;line-height:1.4;margin:22px 0 12px;letter-spacing:-.1px}
.muted{color:var(--muted);font-size:13px}
.field{margin:0 0 14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:140px}
.hidden{display:none !important}
/* ---------- Cards ---------- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:18px 20px;margin:0 0 16px;
  transition:box-shadow .2s ease, transform .2s ease, border-color .2s ease;
}
.card.answered{
  border-color:#bfe6cb;
  background:linear-gradient(0deg,var(--ok-soft),var(--ok-soft)) padding-box,var(--card);
  box-shadow:0 6px 20px rgba(21,163,74,.12);
}
/* ---------- Buttons ---------- */
button{
  appearance:none;border:1px solid transparent;
  background:linear-gradient(180deg,var(--brand) 0%,var(--brand-d) 100%);
  color:#fff;font-family:inherit;font-size:15px;font-weight:600;line-height:1;
  padding:12px 18px;border-radius:var(--r-sm);cursor:pointer;
  transition:filter .15s ease, transform .1s ease, box-shadow .15s ease, background .15s ease;
  box-shadow:0 2px 8px rgba(58,99,240,.28);-webkit-tap-highlight-color:transparent;
}
button:hover{filter:brightness(1.05);box-shadow:0 4px 14px rgba(58,99,240,.34)}
button:active{transform:translateY(1px);box-shadow:0 1px 5px rgba(58,99,240,.3)}
button:focus-visible{outline:3px solid var(--brand-soft);outline-offset:2px}
button.ghost{background:var(--brand-soft);color:var(--brand-d);border-color:#d6e0ff;box-shadow:none}
button.ghost:hover{background:#e0e8ff;filter:none}
button.danger{background:var(--bad-soft);color:var(--bad);border-color:#f3c9c9;box-shadow:none}
button.danger:hover{background:#fbdcdc;filter:none}
button.sm{padding:7px 12px;font-size:13px;border-radius:8px;box-shadow:none}
button.sm:not(.ghost):not(.danger){box-shadow:0 1px 5px rgba(58,99,240,.25)}
button:disabled{opacity:.5;cursor:not-allowed;filter:none !important;transform:none !important;box-shadow:none !important}
/* ---------- Forms ---------- */
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 6px}
input:not([type=radio]):not([type=checkbox]),select,textarea{
  width:100%;font-family:inherit;font-size:15px;color:var(--ink);
  background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:11px 13px;transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
  -webkit-appearance:none;appearance:none;
}
input[type=radio],input[type=checkbox]{accent-color:var(--brand);cursor:pointer}
textarea{min-height:96px;resize:vertical;line-height:1.55}
select{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%2369748a' d='M1 1l5 5 5-5'/></svg>");
  background-repeat:no-repeat;background-position:right 13px center;padding-right:34px;
}
input::placeholder,textarea::placeholder{color:#9aa5b8}
input:hover,select:hover,textarea:hover{border-color:#cfd8e8}
input:focus,select:focus,textarea:focus{outline:none;background:var(--card);border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
/* ---------- Tags / Pills ---------- */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--muted);background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px 10px;line-height:1.6}
.tag.score{color:var(--warn);background:var(--warn-soft);border-color:#f4dcb4}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;border-radius:var(--r-pill);padding:4px 12px;border:1px solid transparent}
.pill.pass{color:var(--ok);background:var(--ok-soft);border-color:#bfe6cb}
.pill.pass::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok)}
.pill.fail{color:var(--bad);background:var(--bad-soft);border-color:#f3c9c9}
.pill.fail::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--bad)}
/* ---------- Quiz: choices ---------- */
.choice{
  display:flex;align-items:center;gap:11px;padding:13px 14px;margin:8px 0;
  background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);
  cursor:pointer;position:relative;
  transition:border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .05s ease;
  -webkit-tap-highlight-color:transparent;
}
.choice input[type=radio],.choice input[type=checkbox]{width:20px;height:20px;flex:0 0 20px;margin:0;accent-color:var(--brand);cursor:pointer}
.choice:hover{border-color:#b9c6ea;background:#fafbff}
.choice:active{transform:scale(.995)}
.choice.sel{border-color:var(--brand);background:var(--brand-soft);box-shadow:inset 3px 0 0 var(--brand)}
.choice.right{border-color:var(--ok);background:var(--ok-soft);box-shadow:inset 3px 0 0 var(--ok)}
.choice.wrong{border-color:var(--bad);background:var(--bad-soft);box-shadow:inset 3px 0 0 var(--bad)}
.ord-sel{display:inline-block;width:auto;min-width:56px;padding:6px 26px 6px 10px;font-size:14px;font-weight:600;margin-right:8px;background-color:var(--brand-soft);border-color:#d6e0ff;color:var(--brand-d)}
/* ---------- Quiz: sticky progress ---------- */
#quiz-progress{
  position:sticky;top:0;z-index:45;display:flex;align-items:center;gap:12px;
  padding:12px 16px;margin:0 -18px 16px;
  background:rgba(255,255,255,.9);backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid var(--line);box-shadow:0 4px 14px rgba(28,42,80,.06);
}
.ptrack{flex:1;height:8px;background:var(--line);border-radius:var(--r-pill);overflow:hidden}
.pfill{height:100%;width:0%;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--brand),#6a86ff);transition:width .4s cubic-bezier(.4,0,.2,1)}
#progress-text{font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
#quiz-timer{font-size:14px;font-weight:700;color:var(--brand-d);background:var(--brand-soft);border:1px solid #d6e0ff;border-radius:var(--r-pill);padding:5px 12px;white-space:nowrap;font-variant-numeric:tabular-nums}
.qstatus{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:var(--r-pill);padding:3px 10px}
.qstatus.done{color:var(--ok);background:var(--ok-soft)}
.qstatus.todo{color:var(--muted);background:var(--card-2);border:1px solid var(--line)}
/* ---------- Result banner ---------- */
.result-banner{text-align:center;padding:32px 22px;border-radius:var(--r);background:linear-gradient(160deg,#fff,var(--brand-soft));border:1px solid var(--line);box-shadow:var(--shadow);margin:0 0 18px}
.result-banner .score{display:block;font-size:44px;font-weight:800;line-height:1.1;letter-spacing:-1px;color:var(--brand-d);font-variant-numeric:tabular-nums;margin:6px 0}
/* ---------- Answer feedback ---------- */
.ans-fb{display:flex;align-items:flex-start;gap:8px;font-size:14px;font-weight:600;border-radius:var(--r-sm);padding:10px 13px;margin-top:10px;border:1px solid var(--line)}
.ans-fb.ok{color:var(--ok);background:var(--ok-soft);border-color:#bfe6cb}
.ans-fb.no{color:var(--bad);background:var(--bad-soft);border-color:#f3c9c9}
.qmark{color:var(--muted);font-size:13px;font-style:normal}
#loading{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
#loading::before{content:"";display:block;width:28px;height:28px;margin:0 auto 12px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ---------- Admin: tabs ---------- */
.tabs{display:flex;gap:4px;flex-wrap:wrap;background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:5px;margin:0 0 20px}
.tabs button{background:transparent;color:var(--muted);box-shadow:none;border:none;font-weight:600;font-size:14px;padding:9px 16px;border-radius:8px;flex:0 1 auto}
.tabs button:hover{background:rgba(58,99,240,.07);color:var(--brand-d);filter:none}
.tabs button.active{background:var(--card);color:var(--brand-d);box-shadow:var(--shadow-sm)}
/* ---------- Admin: tables ---------- */
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;font-size:14px;box-shadow:var(--shadow-sm)}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
th{background:var(--card-2);color:var(--muted);font-weight:700;font-size:12px;letter-spacing:.3px;white-space:nowrap}
tbody tr:last-child td,tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s ease}
tbody tr:hover{background:var(--brand-soft)}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;background:var(--card-2);border:1px dashed var(--line);border-radius:var(--r)}
code{font-family:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;font-size:.88em;background:var(--card-2);color:var(--brand-d);border:1px solid var(--line);border-radius:6px;padding:1px 6px}
/* ---------- Admin: home grid ---------- */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:0 0 20px}
.home-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px 18px;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;display:flex;flex-direction:column;gap:6px}
.home-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#c9d6ff}
.home-card:focus-visible{outline:3px solid var(--brand-soft);outline-offset:2px}
/* ---------- Admin: question items ---------- */
.q-item{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px 18px;margin:0 0 12px;transition:box-shadow .15s ease, border-color .15s ease}
.q-item:hover{box-shadow:var(--shadow);border-color:#d5deef}
.q-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:0 0 10px;font-weight:700;font-size:15px}
.opt-line{display:flex;align-items:center;gap:8px;padding:7px 11px;margin:5px 0;background:var(--card-2);border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink)}
.opt-line.correct{color:var(--ok);background:var(--ok-soft);border-color:#bfe6cb;font-weight:600}
.opt-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.opt-row input,.opt-row select,.opt-row textarea{flex:1}
.opt-row .pick{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:13px;color:var(--muted);cursor:pointer;flex:0 0 auto}
.opt-row .pick input{width:18px;height:18px;flex:0 0 auto;accent-color:var(--brand);cursor:pointer;margin:0}
.link{background:none;border:none;box-shadow:none;color:var(--brand);font-weight:600;font-size:14px;padding:4px 6px;cursor:pointer;text-decoration:none;border-radius:6px}
.link:hover{color:var(--brand-d);text-decoration:underline;background:none;filter:none}
.link.danger{color:var(--bad);background:none}
.link.danger:hover{color:#b91c1c;background:none}
/* ---------- Global: toast ---------- */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:9999;max-width:88vw;background:#1c2431;color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:var(--r-pill);box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease}
.toast.show,.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important}}
/* ============================================================
   MOBILE (≤560px)
   ============================================================ */
/* 排序题：选项区 → 排序区 */
.order-lbl{font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 6px}
.order-zone{counter-reset:oz;min-height:56px;display:flex;flex-direction:column;gap:8px;padding:10px;border:1.5px dashed #b9c6ea;border-radius:var(--r-sm);background:var(--card-2)}
.order-zone:empty::before{content:"把选项拖到这里排序";color:var(--muted);font-size:13px;display:block;text-align:center;padding:8px 0}
.order-pool{display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:1px solid var(--line);border-radius:var(--r-sm);min-height:44px}
.order-pool:empty::before{content:"选项已全部放入排序区";color:var(--muted);font-size:13px}
.opt-chip{padding:10px 14px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;font-size:14px}
.order-zone .opt-chip{counter-increment:oz;display:block;background:var(--brand-soft);border-color:#cdd9ff}
.order-zone .opt-chip::before{content:counter(oz)". ";font-weight:800;color:var(--brand-d)}
.opt-chip.dragging{opacity:.9;border-color:var(--brand);box-shadow:var(--shadow);cursor:grabbing}
/* 连线题：拖拽/点选连线 */
.match-box{position:relative;display:flex;gap:52px;align-items:flex-start}
.match-svg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible;z-index:2}
.match-col{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0;position:relative;z-index:1}
.match-node{padding:12px 14px;background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;transition:border-color .12s,background .12s;font-size:14px}
.match-node.connected{border-color:var(--brand);background:var(--brand-soft)}
.m-left.pending{border-color:var(--warn);background:var(--warn-soft);box-shadow:0 0 0 2px var(--warn-soft)}
/* 答题卡（快捷选题） */
#qnav{margin:0 0 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:12px 14px}
.qnav-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.qnav-grid{display:flex;flex-wrap:wrap;gap:8px}
.qnav-chip{width:38px;height:38px;min-height:0;padding:0;border-radius:9px;font-weight:700;font-size:14px;background:var(--card);border:1.5px solid var(--line);color:var(--muted);box-shadow:none;transition:transform .1s ease,background .12s ease,border-color .12s ease}
.qnav-chip:hover{transform:translateY(-1px);filter:none}
.qnav-chip.done{background:var(--ok-soft);border-color:#bfe6cb;color:var(--ok)}
.qnav-chip.todo{background:var(--warn-soft);border-color:#f4dcb4;color:var(--warn)}
@media (min-width:1130px){
  #qnav{position:fixed;left:16px;top:88px;width:88px;margin:0;max-height:76vh;overflow:auto;z-index:30}
  .qnav-grid{gap:6px}
  .qnav-chip{width:34px;height:34px}
}
@media (max-width:560px){
  :root{--fs:16px;--r:12px}
  .qnav-chip{width:36px;height:36px}
  .match-box{gap:22px}
  .match-node{padding:11px 10px;font-size:13px}
  .wrap{padding:14px 14px 56px}
  .topbar{border-radius:0;margin:-14px -14px 16px;padding:12px 14px;border-left:none;border-right:none;border-top:none}
  h1{font-size:19px}
  h2{font-size:16px;margin:18px 0 10px}
  .card{padding:16px}
  button{width:100%;padding:14px 18px;font-size:16px;min-height:48px}
  button.sm{width:auto;min-height:40px;padding:9px 14px;font-size:14px}
  .tabs button{width:auto;min-height:0}
  .link{width:auto}
  .row{gap:10px}
  .row>*{flex:1 1 100%;min-width:0}
  input,select,textarea{font-size:16px;padding:13px 14px;min-height:48px}
  textarea{min-height:110px}
  .choice{padding:15px 14px;min-height:52px}
  .choice input[type=radio],.choice input[type=checkbox]{width:22px;height:22px;flex-basis:22px}
  #quiz-progress{margin:0 -14px 14px;border-radius:0}
  .result-banner{padding:28px 18px}
  .result-banner .score{font-size:40px}
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .home-grid{grid-template-columns:1fr;gap:12px}
  .toast{top:12px;font-size:15px;padding:12px 18px}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="wrap">
  <div id="loading">连接中…</div>

  <section id="view-quiz-entry" class="hidden">
    <div class="topbar"><div class="brand"><span class="logo">✍️</span><span id="quiz-entry-title">岗位测评</span></div></div>
    <div class="card">
      <h2>开始答题</h2>
      <p class="muted" id="quiz-entry-desc"></p>
      <div class="row">
        <div class="field"><label>姓名 *</label><input id="taker-name" placeholder="请输入姓名"></div>
        <div class="field"><label>工号</label><input id="taker-id" placeholder="请输入工号"></div>
      </div>
      <div class="field hidden" id="taker-group-wrap"><label>所属分组</label><select id="taker-group"></select></div>
      <p class="muted" id="taker-hint" style="font-size:13px"></p>
      <button id="start-btn" onclick="startQuiz()">开始答题 →</button>
    </div>
  </section>

  <section id="view-quiz" class="hidden">
    <div class="topbar"><div class="brand"><span class="logo">✍️</span><span id="quiz-title">岗位测评</span></div><span class="muted" id="quiz-who"></span></div>
    <div id="quiz-progress"><span id="progress-text">已完成 0 / 0 题</span><div class="ptrack"><div class="pfill" id="progress-fill"></div></div><span id="quiz-timer" class="hidden" style="font-weight:700;font-size:14px;white-space:nowrap;color:var(--muted)"></span></div>
    <div id="qnav" class="hidden"></div>
    <div id="quiz-questions"></div>
    <button id="submit-btn" onclick="submitQuiz()" style="width:100%;padding:14px">提交答卷</button>
  </section>

  <section id="view-result" class="hidden">
    <div class="topbar"><div class="brand"><span class="logo">✓</span><span>测评结果</span></div></div>
    <div id="result-banner"></div>
    <div id="result-detail"></div>
    <button class="ghost" style="width:100%" onclick="restart()">完成 / 下一位答题</button>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ 配置 ============ */
const SUPABASE_URL='https://eyivdjgaziepvhuxtrma.supabase.co';
const SUPABASE_KEY='sb_publishable_S-jg61KZdUmbyTStoPv6DQ_2l_0Oxfb';
const SB=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const TYPE_LABEL={single:'单选题',multiple:'多选题',judge:'判断题',fill:'填空题',order:'排序题',match:'连线题'};
const LETTERS='ABCDEFGH';

/* ============ utils ============ */
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escAttr(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function show(v){['quiz-entry','quiz','result'].forEach(x=>{const el=document.getElementById('view-'+x);if(el)el.classList.toggle('hidden',x!==v);});document.getElementById('loading').classList.add('hidden');window.scrollTo(0,0);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

let SETTINGS={title:'岗位测评',desc:'',pass:60,showscore:1,shuffle:0,timelimit:0,groups:[]}, rosterEmpty=false;
let currentTaker=null, quizList=[], timerInt=null, timeLeft=0;
const TOUCHED=new Set();   // 排序/连线题是否已被操作过（用于判定"已作答"）
const MATCH_COLORS=['#3a63f0','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============ entry ============ */
async function setupEntry(){
  try{
    const {data:s}=await SB.from('app_settings').select('*').eq('id',1).single();
    if(s) SETTINGS={title:s.title||'岗位测评',desc:s.descr||'',pass:s.pass??60,showscore:s.showscore??1,shuffle:s.shuffle??0,timelimit:s.timelimit??0,groups:s.groups||[]};
    const re=await SB.rpc('roster_empty'); rosterEmpty=!!(re.data);
  }catch(e){ toast('连接数据库失败，请检查网络'); }
  document.title=SETTINGS.title+' · 答题';
  document.getElementById('quiz-entry-title').textContent=SETTINGS.title;
  document.getElementById('quiz-title').textContent=SETTINGS.title;
  document.getElementById('quiz-entry-desc').textContent=SETTINGS.desc||'';
  document.getElementById('taker-name').value='';
  document.getElementById('taker-id').value='';
  const gw=document.getElementById('taker-group-wrap');
  gw.classList.toggle('hidden',!rosterEmpty);
  if(rosterEmpty){
    document.getElementById('taker-group').innerHTML=(SETTINGS.groups||[]).map(g=>'<option value="'+escAttr(g)+'">'+esc(g)+'</option>').join('');
    document.getElementById('taker-hint').textContent='（名单未导入）请选择你的分组、并务必填写工号后答题。';
  }else{
    document.getElementById('taker-hint').textContent='填工号最准；也可只填姓名（中文名 / 英文名 / 花名 任一种都行），系统会自动匹配你的分组。';
  }
  show('quiz-entry');
}
function restart(){ clearInterval(timerInt); setupEntry(); }

/* ============ quiz ============ */
async function startQuiz(){
  const name=document.getElementById('taker-name').value.trim();
  if(!name){toast('请填写姓名');return;}
  const empid=document.getElementById('taker-id').value.trim();
  const btn=document.getElementById('start-btn'); btn.disabled=true; btn.textContent='加载中…';
  try{
    let group;
    if(rosterEmpty){
      group=document.getElementById('taker-group').value;
      if(!group){toast('请选择分组');return;}
      if(!empid){toast('自选分组时必须填写工号，以区分同名人员');return;}
    }else{
      const {data,error}=await SB.rpc('lookup_group',{p_name:name,p_empid:empid});
      if(error){toast('查询失败：'+error.message);return;}
      if(!data){toast('未在名单中找到你的信息，请联系管理员');return;}
      group=data;
    }
    const {data:qs,error:qe}=await SB.from('public_questions').select('*').eq('grp',group).order('sort');
    if(qe){toast('题目加载失败：'+qe.message);return;}
    if(!qs||qs.length===0){toast('「'+group+'」组暂无题目，请联系管理员');return;}
    quizList=qs.map(r=>({id:r.id,group:r.grp,type:r.type,title:r.title,options:r.options||[],images:r.images||[]}));
    if(SETTINGS.shuffle) shuffleArr(quizList);
    quizList.forEach(q=>{
      if(q.type==='match'){
        q.mLefts=(q.options&&q.options.lefts)||[]; q.mRights=(q.options&&q.options.rights)||[];
        q.dispLeft=q.mLefts.map((_,i)=>i); if(SETTINGS.shuffle) shuffleArr(q.dispLeft);
      }else{
        q.disp=(Array.isArray(q.options)?q.options:[]).map((_,i)=>i); if(SETTINGS.shuffle) shuffleArr(q.disp);
      }
    });
    currentTaker={name,empid,group};
    document.getElementById('quiz-who').textContent='答题人：'+name+'（'+group+'）';
    renderQuiz();
    show('quiz');
  }finally{ btn.disabled=false; btn.textContent='开始答题 →'; }
}
function renderQuiz(){
  TOUCHED.clear();
  const pts=Math.round(100/quizList.length*10)/10;
  const oImg=o=>o.img?'<img src="'+escAttr(o.img)+'" style="max-width:100%;max-height:160px;border-radius:6px;display:block;margin-top:6px">':'';
  document.getElementById('quiz-questions').innerHTML=quizList.map((q,i)=>{
    let body='';
    if(q.type==='single'||q.type==='multiple'){
      body=q.disp.map((oi,pos)=>'<label class="choice" onclick="toggleChoice(this)" style="align-items:flex-start"><input type="'+(q.type==='single'?'radio':'checkbox')+'" name="q-'+q.id+'" value="'+oi+'" style="margin-top:3px"><span>'+LETTERS[pos]+'. '+esc(q.options[oi].text)+oImg(q.options[oi])+'</span></label>').join('');
    }else if(q.type==='order'){
      body='<div class="qmark" style="margin-bottom:8px">从下方「选项区」把选项拖入上方「排序区」，从上到下即第 1、2、3… 位（点选项也可添加，点排序区里的选项可退回）</div>'+
        '<div class="order-lbl">排序区（答案）</div>'+
        '<div class="order-zone" id="oz-'+q.id+'" data-qid="'+q.id+'"></div>'+
        '<div class="order-lbl">选项区</div>'+
        '<div class="order-pool" id="op-'+q.id+'" data-qid="'+q.id+'">'+
        q.disp.map(oi=>'<div class="opt-chip" data-oi="'+oi+'" data-q="'+q.id+'">'+esc(q.options[oi].text)+oImg(q.options[oi])+'</div>').join('')+
        '</div>';
    }else if(q.type==='match'){
      const rights=q.mRights;
      body='<div class="qmark" style="margin-bottom:8px">从左侧方块拖到右侧对应方块连线；也可先点左块、再点右块。点已连的左块可取消。</div>'+
        '<div class="match-box" id="match-'+q.id+'" data-qid="'+q.id+'"><svg class="match-svg"></svg>'+
          '<div class="match-col match-left">'+q.dispLeft.map(li=>'<div class="match-node m-left" data-li="'+li+'">'+esc(q.mLefts[li].text||'')+(q.mLefts[li].img?'<img src="'+escAttr(q.mLefts[li].img)+'" style="max-height:70px;border-radius:4px;display:block;margin-top:4px">':'')+'</div>').join('')+'</div>'+
          '<div class="match-col match-right">'+rights.map((r,ri)=>'<div class="match-node m-right" data-ri="'+ri+'"><b>'+(ri+1)+'.</b> '+esc(r.text||'')+(r.img?'<img src="'+escAttr(r.img)+'" style="max-height:70px;border-radius:4px;display:block;margin-top:4px">':'')+'</div>').join('')+'</div>'+
        '</div>';
    }else if(q.type==='judge'){
      body=['对','错'].map(v=>'<label class="choice" onclick="toggleChoice(this)"><input type="radio" name="q-'+q.id+'" value="'+v+'"><span>'+v+'</span></label>').join('');
    }else if(q.type==='fill'){
      body='<input type="text" name="q-'+q.id+'" placeholder="请输入答案" oninput="refreshProgress()">';
    }
    const stemImgs=(q.images||[]).map(u=>'<img src="'+escAttr(u)+'" style="max-width:100%;border-radius:8px;margin:4px 0;border:1px solid var(--line)">').join('');
    const clearable=(q.type==='single'||q.type==='judge');
    return '<div class="card" id="qc-'+q.id+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">'+
      '<div><span class="tag">'+TYPE_LABEL[q.type]+'</span><span class="tag score">'+pts+'分</span><br><strong>'+(i+1)+'. '+esc(q.title)+'</strong></div>'+
      '<span class="qstatus todo" id="st-'+q.id+'">⬜ 未作答</span></div>'+stemImgs+body+
      (clearable?'<button class="link" style="margin-top:6px" onclick="clearAnswer(\''+q.id+'\')">清除 / 标记不确定</button>':'')+'</div>';
  }).join('');
  initInteractions();
  buildQNav();
  refreshProgress();
  startTimer();
}
/* ===== 排序题：从选项区拖入排序区 ===== */
function markTouched(qid){ TOUCHED.add(qid); }
let _od=null;
function initInteractions(){
  document.querySelectorAll('.opt-chip').forEach(chip=>{
    chip.addEventListener('pointerdown', e=>{
      e.preventDefault();
      const q=chip.dataset.q;
      chip.setPointerCapture(e.pointerId); chip.classList.add('dragging');
      _od={chip,q,moved:false,zone:document.getElementById('oz-'+q),pool:document.getElementById('op-'+q)};
      chip.addEventListener('pointermove', chipMove);
      chip.addEventListener('pointerup', chipUp);
      chip.addEventListener('pointercancel', chipUp);
    });
  });
  document.querySelectorAll('.match-box').forEach(box=>{ box._conn=box._conn||{}; box._pending=null;
    box.addEventListener('pointerdown', e=>onMatchDown(e,box));
    [...box.querySelectorAll('img')].forEach(im=>im.addEventListener('load',()=>drawMatch(box)));
    setTimeout(()=>drawMatch(box),60);
  });
}
function chipMove(e){
  if(!_od) return; _od.moved=true;
  const {chip,zone,pool}=_od;
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const t=el&&el.closest?el.closest('.order-zone,.order-pool'):null;
  if(t!==zone && t!==pool) return;
  if(t===zone){
    const sibs=[...zone.querySelectorAll('.opt-chip')].filter(c=>c!==chip);
    let ref=null;
    for(const s of sibs){ const r=s.getBoundingClientRect(); if(e.clientY < r.top+r.height/2){ ref=s; break; } }
    if(ref) zone.insertBefore(chip,ref); else zone.appendChild(chip);
  }else if(chip.parentNode!==pool){ pool.appendChild(chip); }
  markTouched(_od.q); refreshProgress();
}
function chipUp(e){
  if(!_od) return; const {chip,zone,pool,q,moved}=_od;
  chip.classList.remove('dragging');
  chip.removeEventListener('pointermove', chipMove);
  chip.removeEventListener('pointerup', chipUp);
  chip.removeEventListener('pointercancel', chipUp);
  _od=null;
  if(!moved){ // 点选：选项区→排序区，或排序区→退回选项区
    if(zone.contains(chip)) pool.appendChild(chip); else zone.appendChild(chip);
    markTouched(q);
  }
  refreshProgress();
}
/* ===== 连线题：拖拽/点选连线 ===== */
function mConnect(box,li,ri){ box._conn=box._conn||{}; Object.keys(box._conn).forEach(k=>{if(box._conn[k]===ri)delete box._conn[k];}); box._conn[li]=ri; setPending(box,null); markTouched(box.dataset.qid); drawMatch(box); refreshProgress(); }
function mClear(box,li){ if(box._conn) delete box._conn[li]; drawMatch(box); refreshProgress(); }
function setPending(box,li){ box._pending=(li==null?null:String(li)); box.querySelectorAll('.m-left').forEach(n=>n.classList.toggle('pending', box._pending!=null && n.dataset.li===box._pending)); }
function drawMatch(box,temp){
  const svg=box.querySelector('.match-svg'); if(!svg) return;
  const br=box.getBoundingClientRect();
  svg.setAttribute('viewBox','0 0 '+br.width+' '+br.height); svg.setAttribute('width',br.width); svg.setAttribute('height',br.height);
  const conn=box._conn||{}; let s='';
  Object.keys(conn).forEach(li=>{
    const l=box.querySelector('.m-left[data-li="'+li+'"]'); const r=box.querySelector('.m-right[data-ri="'+conn[li]+'"]');
    if(!l||!r) return; const lr=l.getBoundingClientRect(), rr=r.getBoundingClientRect();
    const x1=lr.right-br.left,y1=lr.top+lr.height/2-br.top,x2=rr.left-br.left,y2=rr.top+rr.height/2-br.top;
    s+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+MATCH_COLORS[(+li)%MATCH_COLORS.length]+'" stroke-width="3" stroke-linecap="round"/>';
  });
  if(temp) s+='<line x1="'+temp.x1+'" y1="'+temp.y1+'" x2="'+temp.x2+'" y2="'+temp.y2+'" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>';
  svg.innerHTML=s;
  box.querySelectorAll('.m-left').forEach(n=>n.classList.toggle('connected', conn[n.dataset.li]!==undefined));
  const used={}; Object.keys(conn).forEach(li=>used[conn[li]]=1);
  box.querySelectorAll('.m-right').forEach(n=>n.classList.toggle('connected', used[n.dataset.ri]!==undefined));
}
function onMatchDown(e,box){
  const left=e.target.closest('.m-left'); const right=e.target.closest('.m-right');
  if(left){
    e.preventDefault(); box._drag={li:left.dataset.li,from:left,moved:false};
    box.setPointerCapture(e.pointerId);
    box._mm=ev=>onMatchMove(ev,box); box._mu=ev=>onMatchUp(ev,box);
    box.addEventListener('pointermove',box._mm); box.addEventListener('pointerup',box._mu); box.addEventListener('pointercancel',box._mu);
  }else if(right){
    if(box._pending!=null) mConnect(box, box._pending, right.dataset.ri);
  }
}
function onMatchMove(e,box){
  if(!box._drag) return; box._drag.moved=true;
  const br=box.getBoundingClientRect(); const l=box._drag.from.getBoundingClientRect();
  drawMatch(box,{x1:l.right-br.left,y1:l.top+l.height/2-br.top,x2:e.clientX-br.left,y2:e.clientY-br.top});
}
function onMatchUp(e,box){
  box.removeEventListener('pointermove',box._mm); box.removeEventListener('pointerup',box._mu); box.removeEventListener('pointercancel',box._mu);
  const d=box._drag; box._drag=null; if(!d) return;
  if(d.moved){
    const el=document.elementFromPoint(e.clientX,e.clientY); const right=el&&el.closest?el.closest('.m-right'):null;
    if(right && box.contains(right)) mConnect(box,d.li,right.dataset.ri); else drawMatch(box);
  }else{
    if(box._conn[d.li]!==undefined){ mClear(box,d.li); setPending(box,null); }
    else setPending(box, box._pending===d.li?null:d.li);
  }
}
window.addEventListener('resize',()=>document.querySelectorAll('.match-box').forEach(b=>drawMatch(b)));
function buildQNav(){
  const nav=document.getElementById('qnav'); if(!nav) return;
  nav.classList.remove('hidden');
  nav.innerHTML='<div class="qnav-title">答题卡（点题号可跳转）</div><div class="qnav-grid">'+
    quizList.map((q,i)=>'<button type="button" class="qnav-chip todo" id="qn-'+q.id+'" onclick="jumpTo(\''+q.id+'\')">'+(i+1)+'</button>').join('')+'</div>';
}
function jumpTo(id){ const el=document.getElementById('qc-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
function startTimer(){
  clearInterval(timerInt);
  const tEl=document.getElementById('quiz-timer');
  if(!SETTINGS.timelimit||SETTINGS.timelimit<=0){ if(tEl)tEl.classList.add('hidden'); return; }
  timeLeft=SETTINGS.timelimit*60;
  tEl.classList.remove('hidden');
  const tick=()=>{
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    tEl.textContent='⏱ '+m+':'+String(s).padStart(2,'0');
    tEl.style.color = timeLeft<=60 ? 'var(--bad)' : 'var(--muted)';
    if(timeLeft<=0){ clearInterval(timerInt); toast('时间到，已自动交卷'); submitQuiz(true); return; }
    timeLeft--;
  };
  tick(); timerInt=setInterval(tick,1000);
}
function toggleChoice(label){
  const input=label.querySelector('input');
  if(input.type==='radio'){document.getElementsByName(input.name).forEach(r=>r.closest('.choice').classList.remove('sel'));input.checked=true;label.classList.add('sel');}
  else{setTimeout(()=>label.classList.toggle('sel',input.checked),0);}
  refreshProgress();
}
function clearAnswer(id){document.getElementsByName('q-'+id).forEach(r=>{r.checked=false;const c=r.closest('.choice');if(c)c.classList.remove('sel');});refreshProgress();}
function isAnswered(q){
  if(q.type==='match'){const box=document.getElementById('match-'+q.id);return !!(box&&box._conn&&Object.keys(box._conn).length>=q.mLefts.length);}
  if(q.type==='order'){const z=document.getElementById('oz-'+q.id);return !!(z&&z.querySelectorAll('.opt-chip').length===q.options.length);}
  if(q.type==='fill'){const el=document.getElementsByName('q-'+q.id)[0];return !!(el&&el.value.trim());}
  let a=false;document.getElementsByName('q-'+q.id).forEach(r=>{if(r.checked)a=true});return a;
}
function refreshProgress(){
  let done=0;
  quizList.forEach(q=>{const ans=isAnswered(q);if(ans)done++;
    const st=document.getElementById('st-'+q.id);if(st){st.textContent=ans?'✅ 已作答':'⬜ 未作答';st.className='qstatus '+(ans?'done':'todo');}
    const c=document.getElementById('qc-'+q.id);if(c)c.classList.toggle('answered',ans);
    const chip=document.getElementById('qn-'+q.id);if(chip){chip.classList.toggle('done',ans);chip.classList.toggle('todo',!ans);}});
  const n=quizList.length;
  document.getElementById('progress-fill').style.width=(n?done/n*100:0)+'%';
  document.getElementById('progress-text').textContent='已完成 '+done+' / '+n+' 题';
}
function collectAnswer(q){
  if(q.type==='single'){let v=null;document.getElementsByName('q-'+q.id).forEach(r=>{if(r.checked)v=parseInt(r.value)});return v;}
  if(q.type==='judge'){let v=null;document.getElementsByName('q-'+q.id).forEach(r=>{if(r.checked)v=r.value});return v;}
  if(q.type==='multiple'){const a=[];document.getElementsByName('q-'+q.id).forEach(r=>{if(r.checked)a.push(parseInt(r.value))});return a.length?a:null;}
  if(q.type==='order'){ const z=document.getElementById('oz-'+q.id); if(!z) return null; const chips=[...z.querySelectorAll('.opt-chip')]; if(chips.length<q.options.length) return null; return chips.map(c=>parseInt(c.dataset.oi)); }
  if(q.type==='match'){ const box=document.getElementById('match-'+q.id); if(!box||!box._conn||!Object.keys(box._conn).length) return null; const n=q.mLefts.length; const seq=new Array(n).fill(-1); Object.keys(box._conn).forEach(li=>{seq[+li]=box._conn[li];}); return seq; }
  if(q.type==='fill'){const el=document.getElementsByName('q-'+q.id)[0];return el?el.value.trim():'';}
  return null;
}
async function submitQuiz(auto){
  if(!auto){
    const undone=quizList.filter(q=>!isAnswered(q)).length;
    if(undone>0 && !confirm('还有 '+undone+' 题未作答，确定提交吗？')) return;
  }
  clearInterval(timerInt);
  const answers={};
  quizList.forEach(q=>{const a=collectAnswer(q);if(a!==null&&a!=='')answers[q.id]=a;});
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='提交中…';
  try{
    const {data,error}=await SB.rpc('submit_quiz',{p_name:currentTaker.name,p_empid:currentTaker.empid,p_group:currentTaker.group,p_answers:answers});
    if(error){toast(error.message||'提交失败');return;}
    showResult(data);
  }finally{btn.disabled=false;btn.textContent='提交答卷';}
}
function showResult(d){
  const pass=d.score>=SETTINGS.pass;
  if(parseInt(SETTINGS.showscore)===0){
    document.getElementById('result-banner').innerHTML='<div class="result-banner" style="background:#eef3ff"><div style="font-size:40px">✅</div><h2 style="margin:8px 0 0">提交成功</h2><p class="muted">感谢 '+esc(currentTaker.name)+' 完成测评</p></div>';
    document.getElementById('result-detail').innerHTML='';show('result');return;
  }
  document.getElementById('result-banner').innerHTML='<div class="result-banner" style="background:'+(pass?'#ecfdf3':'#fef2f2')+'">'+
    '<div class="muted">'+esc(currentTaker.name)+' 的成绩</div>'+
    '<div class="score" style="color:'+(pass?'var(--ok)':'var(--bad)')+'">'+d.score+'<span style="font-size:22px;color:var(--muted)"> / '+d.total+'</span></div>'+
    '<span class="pill '+(pass?'pass':'fail')+'">'+(pass?'及格':'未及格')+'（及格线 '+SETTINGS.pass+'）</span></div>';
  // 只给分数，不再逐题列出对错
  document.getElementById('result-detail').innerHTML='';
  show('result');
}

/* ============ init ============ */
setupEntry();
</script>
